<!DOCTYPE html>
<html class="no-js" lang="" xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org">

<head th:replace="~{base :: head}"></head>

<body>
	<div th:replace="~{base :: navbar}"></div>
	<div th:replace="~{base :: header(text='Booking Success')}"></div>

	<!-- Success Start -->
	<div class="container-fluid py-5">
		<div class="container">

			<!-- Success Message -->
			<div th:if="${successMessage}"
				class="alert alert-success alert-dismissible fade show mb-4"
				role="alert">
				🎉 <span th:text="${successMessage}"></span>
				<button type="button" class="close" data-dismiss="alert">
					<span>&times;</span>
				</button>
			</div>

			<!-- Booking Details Table -->
			<div th:if="${booked}">
				<h4 class="mb-4 text-center">📋 Booking Details</h4>
				<table class="table table-bordered table-striped">
					<tr>
						<th width="30%">Name</th>
						<td th:text="${booked.name}">-</td>
					</tr>
					<tr>
						<th>Phone Number</th>
						<td th:text="${booked.phoneNumber}">-</td>
					</tr>
					<tr>
						<th>Email</th>
						<td th:text="${booked.email}">-</td>
					</tr>
					<tr>
						<th>Date</th>
						<td th:text="${booked.date}">-</td>
					</tr>
					<tr>
						<th>Time</th>
						<td th:text="${booked.time}">-</td>
					</tr>
					<tr>
						<th>Person(s)</th>
						<td th:text="${booked.person}">-</td>
					</tr>
					<tr>
						<th>Booked At</th>
						<td th:text="${booked.bookedAt}">-</td>
					</tr>
				</table>
			</div>

			<!-- If no booked data (direct URL access) -->
			<div th:unless="${booked}" class="text-center py-5">
				<h4 class="text-muted">No booking data found.</h4>
			</div>

			<div class="text-center mt-4 mb-5">
				<a th:href="@{/reservation}" class="btn btn-primary px-5 py-3">
					📅 Book Again </a> <a th:href="@{/home}"
					class="btn btn-secondary px-5 py-3 ml-2"> 🏠 Back to Home </a>
			</div>
		</div>
	</div>
	<!-- Success End -->

	<div th:replace="~{base :: footer}"></div>
	<div th:replace="~{base :: script}"></div>
</body>
</html>
